###############################################################################
# OpenFoundry Console — Nginx Configuration (Production)
###############################################################################

# Run as non-root; the Dockerfile sets up the openfoundry user.
# pid and error_log are configured for the non-root user.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -- Temp paths for non-root operation ------------------------------------
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # -- Logging --------------------------------------------------------------
    log_format main '{"time":"$time_iso8601","remote_addr":"$remote_addr",'
                    '"method":"$request_method","uri":"$request_uri",'
                    '"status":$status,"bytes_sent":$body_bytes_sent,'
                    '"referer":"$http_referer","user_agent":"$http_user_agent",'
                    '"request_time":$request_time}';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # -- Gzip compression ----------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # -- Rate limiting (basic) ------------------------------------------------
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # -- Security headers -------------------------------------------------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://localhost:* https://*.openfoundry.local https://*.openfoundry.example.com; frame-ancestors 'self';" always;

        # -- Health check endpoint for Docker ----------------------------------
        location = /health {
            access_log off;
            return 200 '{"status":"HEALTHY"}';
            add_header Content-Type application/json;
        }

        # -- API proxy to svc-gateway -----------------------------------------
        location /api/ {
            limit_req zone=general burst=50 nodelay;

            proxy_pass http://svc-gateway:8080/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 16 8k;
        }

        # -- Multipass (auth) proxy --------------------------------------------
        location /multipass/ {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://svc-gateway:8080/multipass/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # -- Static assets with aggressive caching ----------------------------
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }

        # -- SPA fallback: serve index.html for all other routes ---------------
        location / {
            limit_req zone=general burst=30 nodelay;
            try_files $uri $uri/ /index.html;

            # No cache for index.html so users always get the latest version.
            location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires "0";
            }
        }

        # -- Deny access to hidden files --------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
