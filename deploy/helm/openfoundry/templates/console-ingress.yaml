{{- if .Values.console.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openfoundry.fullname" . }}-console
  labels:
    {{- include "openfoundry.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
  {{- with .Values.console.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.console.ingress.className }}
  ingressClassName: {{ .Values.console.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.console.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "openfoundry.fullname" . }}-console
                port:
                  number: {{ .Values.console.port }}
  {{- if .Values.console.ingress.tls }}
  tls:
    {{- toYaml .Values.console.ingress.tls | nindent 4 }}
  {{- end }}
{{- end }}
