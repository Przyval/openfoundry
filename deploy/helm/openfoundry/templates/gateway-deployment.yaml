apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openfoundry.fullname" . }}-gateway
  labels:
    {{- include "openfoundry.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "openfoundry.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "openfoundry.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: gateway
          image: {{ .Values.global.image.registry }}/openfoundry/svc-gateway:{{ .Values.global.image.tag }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.gateway.port | quote }}
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "openfoundry.fullname" . }}-config
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "openfoundry.fullname" . }}-config
                  key: REDIS_URL
            {{- range $name, $svc := .Values.services }}
            - name: SVC_{{ $name | upper }}_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "openfoundry.fullname" $ }}-config
                  key: SVC_{{ $name | upper }}_URL
            {{- end }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
