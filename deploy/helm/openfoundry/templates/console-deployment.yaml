apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openfoundry.fullname" . }}-console
  labels:
    {{- include "openfoundry.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
spec:
  replicas: {{ .Values.console.replicas }}
  selector:
    matchLabels:
      {{- include "openfoundry.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: console
  template:
    metadata:
      labels:
        {{- include "openfoundry.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: console
    spec:
      containers:
        - name: console
          image: {{ .Values.global.image.registry }}/openfoundry/app-console:{{ .Values.global.image.tag }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.console.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.console.port | quote }}
            - name: NEXT_PUBLIC_API_URL
              value: "http://{{ include "openfoundry.fullname" . }}-gateway:{{ .Values.gateway.port }}"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
