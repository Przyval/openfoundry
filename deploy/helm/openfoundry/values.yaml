global:
  image:
    registry: ghcr.io
    tag: latest
    pullPolicy: IfNotPresent

postgresql:
  enabled: true
  auth:
    username: openfoundry
    password: openfoundry
    database: openfoundry
  primary:
    persistence:
      size: 10Gi

redis:
  enabled: true
  auth:
    enabled: false

gateway:
  replicas: 2
  port: 8080
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }
  ingress:
    enabled: true
    host: openfoundry.local

services:
  multipass: { replicas: 1, port: 8084 }
  ontology: { replicas: 1, port: 8081 }
  objects: { replicas: 2, port: 8082 }
  actions: { replicas: 1, port: 8083 }
  datasets: { replicas: 1, port: 8085 }
  compass: { replicas: 1, port: 8086 }
  admin: { replicas: 1, port: 8087 }
  functions: { replicas: 1, port: 8088 }
  webhooks: { replicas: 1, port: 8089 }
  media: { replicas: 1, port: 8090 }
  sentinel: { replicas: 1, port: 8091 }

console:
  replicas: 1
  port: 3000
  ingress:
    enabled: true
    host: console.openfoundry.local
