services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openfoundry
      POSTGRES_USER: openfoundry
      POSTGRES_PASSWORD: openfoundry
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/migrate.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfoundry"]
      interval: 5s
      retries: 5

  openfoundry:
    build: .
    ports:
      - "3000:3000"   # Frontend (Vite)
      - "8080:8080"   # Gateway API
    volumes:
      - openfoundry-data:/tmp/openfoundry-data  # Persist data across restarts
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DATABASE_URL=postgresql://openfoundry:openfoundry@postgres:5432/openfoundry
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  openfoundry-data:
  pgdata:
